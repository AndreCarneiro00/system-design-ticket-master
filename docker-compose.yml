services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: ticket_api
    command: uvicorn api.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: payment_worker
    command: python -m workers.payment_worker
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  expiration_worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: ticket_expiration_worker
    command: python -m workers.expiration_worker
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  queue_dispatcher:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: ticket_queue_dispatcher
    command: python -m workers.queue_dispatcher
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis

  postgres:
    image: postgres:16
    container_name: ticket_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tickets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ticket_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: